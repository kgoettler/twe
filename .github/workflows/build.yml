name: "Build & test"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "^1.26"

      - name: Install timewarrior
        run: sudo apt-get update && sudo apt-get install -y timewarrior

      - name: Build
        run: make build

      - name: Test
        run: make test
